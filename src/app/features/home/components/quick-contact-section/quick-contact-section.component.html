<section class="section-block quick-contact">
  <div class="page-shell">
    <app-section-title
      eyebrow="Contato rápido"
      title="Fale com uma equipe preparada para entender sua operação e estruturar a melhor solução."
      description="Apresente sua necessidade e receba um contato consultivo com foco em engenharia clínica, tecnologia médica e eficiência operacional."
    ></app-section-title>

    <div class="quick-contact__layout">
      <div class="quick-contact__grid">
        @for (item of items; track item.title) {
          <mat-card class="quick-contact__card" appearance="outlined" appScrollReveal appScrollRevealOrigin="scale">
            <div class="quick-contact__icon">
              <mat-icon>{{ item.icon }}</mat-icon>
            </div>
            <h3>{{ item.title }}</h3>
            <a [href]="item.href" target="_blank" rel="noreferrer">{{ item.value }}</a>
            <p>{{ item.description }}</p>
          </mat-card>
        }
      </div>

      <figure class="quick-contact__visual surface-panel" appScrollReveal appScrollRevealOrigin="right">
        <img
          [ngSrc]="imagePath"
          alt="Contato institucional e atendimento consultivo da Del Tecnologia."
          width="1536"
          height="1024"
          sizes="(max-width: 1024px) 92vw, 38vw"
          loading="lazy"
        >
        <figcaption>
          <strong>Conversa consultiva com leitura da sua operação</strong>
          <span>Relacionamento comercial e técnico pensado para decisão, segurança e continuidade.</span>
        </figcaption>
      </figure>
    </div>
  </div>
</section>
