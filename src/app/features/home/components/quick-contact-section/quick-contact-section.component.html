<section class="section-block quick-contact">
  <div class="page-shell">
    <app-section-title
      [eyebrow]="content?.eyebrow ?? i18n.t('pages.quickContactSection.eyebrow')"
      [title]="content?.title ?? i18n.t('pages.quickContactSection.title')"
      [description]="content?.description ?? i18n.t('pages.quickContactSection.description')"
    ></app-section-title>

    <div class="quick-contact__layout">
      <div class="quick-contact__grid">
        @for (item of items; track item.title) {
          <mat-card class="quick-contact__card" appearance="outlined" appPremiumCard appScrollReveal appScrollRevealOrigin="scale">
            <div class="quick-contact__icon">
              <mat-icon>{{ item.icon }}</mat-icon>
            </div>
            <h3>{{ item.title }}</h3>
            <a [href]="item.href" target="_blank" rel="noreferrer">{{ item.value }}</a>
            <p>{{ item.description }}</p>
          </mat-card>
        }
      </div>

      <figure class="quick-contact__visual surface-panel" appScrollReveal appScrollRevealOrigin="right">
        <img
          [ngSrc]="imagePath"
          [alt]="content?.figure?.alt ?? i18n.t('pages.quickContactSection.figureAlt')"
          width="1536"
          height="1024"
          sizes="(max-width: 1024px) 92vw, 38vw"
          loading="lazy"
        >
        <figcaption>
          <strong>{{ content?.figure?.title ?? i18n.t('pages.quickContactSection.figureTitle') }}</strong>
          <span>{{ content?.figure?.description ?? i18n.t('pages.quickContactSection.figureDescription') }}</span>
        </figcaption>
      </figure>
    </div>
  </div>
</section>
