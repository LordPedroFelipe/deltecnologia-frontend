<section class="section-block">
  <div class="page-shell">
    <app-section-title
      [eyebrow]="content?.eyebrow ?? i18n.t('pages.coverageSection.eyebrow')"
      [title]="content?.title ?? i18n.t('pages.coverageSection.title')"
      [description]="content?.description ?? i18n.t('pages.coverageSection.description')"
    ></app-section-title>

    <div class="coverage__layout">
      <div class="grid-auto-fit">
        @for (item of items; track item.title) {
          <app-info-card [item]="item"></app-info-card>
        }
      </div>

      <figure class="coverage__visual surface-panel" appScrollReveal appScrollRevealOrigin="left">
        <img
          [ngSrc]="imagePath"
          [alt]="content?.figure?.alt ?? i18n.t('pages.coverageSection.figureAlt')"
          width="1536"
          height="1024"
          sizes="(max-width: 1024px) 92vw, 38vw"
          loading="lazy"
        >
        <figcaption>
          <strong>{{ content?.figure?.title ?? i18n.t('pages.coverageSection.figureTitle') }}</strong>
          <span>{{ content?.figure?.description ?? i18n.t('pages.coverageSection.figureDescription') }}</span>
        </figcaption>
      </figure>
    </div>
  </div>
</section>
