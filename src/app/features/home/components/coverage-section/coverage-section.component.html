<section class="section-block">
  <div class="page-shell">
    <app-section-title
      eyebrow="Área de atuação"
      title="Atendimento preparado para operações críticas e ambientes assistenciais de alta responsabilidade."
      description="A Del Tecnologia atua com visão técnica e organizacional para diferentes perfis de instituições de saúde que dependem de ativos eletromédicos confiáveis e bem geridos."
    ></app-section-title>

    <div class="coverage__layout">
      <div class="grid-auto-fit">
        @for (item of items; track item.title) {
          <app-info-card [item]="item"></app-info-card>
        }
      </div>

      <figure class="coverage__visual surface-panel" appScrollReveal appScrollRevealOrigin="left">
        <img
          [ngSrc]="imagePath"
          alt="Atuação da Del Tecnologia em operações de saúde, hospitais e ambientes assistenciais."
          width="1536"
          height="1024"
          sizes="(max-width: 1024px) 92vw, 38vw"
          loading="lazy"
        >
        <figcaption>
          <strong>Presença preparada para ambientes críticos</strong>
          <span>Hospitais, clínicas, laboratórios e operações com alta exigência técnica.</span>
        </figcaption>
      </figure>
    </div>
  </div>
</section>
