<section class="section-block benefits">
  <div class="page-shell">
    <app-section-title
      [eyebrow]="eyebrow || i18n.t('pages.benefitsSection.eyebrow')"
      [title]="title || i18n.t('pages.benefitsSection.defaultTitle')"
      [description]="description || i18n.t('pages.benefitsSection.defaultDescription')"
    ></app-section-title>

    <div class="grid-auto-fit">
      @for (item of items; track item.title) {
        <app-info-card [item]="item"></app-info-card>
      }
    </div>
  </div>
</section>
