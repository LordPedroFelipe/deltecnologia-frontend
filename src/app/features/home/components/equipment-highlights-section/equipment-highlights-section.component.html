<section class="section-block equipment-highlights">
  <div class="page-shell">
    <div class="equipment-highlights__hero surface-panel" appScrollReveal appScrollRevealOrigin="up">
      <div class="equipment-highlights__copy">
        <app-section-title
          [eyebrow]="content?.eyebrow ?? i18n.t('pages.equipmentSection.eyebrow')"
          [title]="content?.title ?? i18n.t('pages.equipmentSection.title')"
          [description]="content?.description ?? i18n.t('pages.equipmentSection.description')"
        ></app-section-title>
      </div>

      <div class="equipment-highlights__summary">
        @for (item of summaryItems; track item.title) {
          <div>
            <strong>{{ item.title }}</strong>
            <span>{{ item.description }}</span>
          </div>
        }
      </div>
    </div>

    <div class="equipment-highlights__grid">
      @for (item of items; track item.title) {
        <mat-card class="equipment-card" appearance="outlined" appPremiumCard appScrollReveal appScrollRevealOrigin="scale">
          <div class="equipment-card__topline">
            <span class="equipment-card__group">{{ item.group }}</span>
            <div class="equipment-card__icon" [style.--accent]="item.accent ?? 'var(--color-primary)'">
              <mat-icon>{{ item.icon }}</mat-icon>
            </div>
          </div>

          <h3>{{ item.title }}</h3>
          <p>{{ item.description }}</p>
        </mat-card>
      }
    </div>
  </div>
</section>
