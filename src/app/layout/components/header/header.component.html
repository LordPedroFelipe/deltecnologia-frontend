<header class="header">
  <mat-toolbar class="header__toolbar">
    <a class="brand" [routerLink]="homeRoute" [attr.aria-label]="i18n.t('ui.accessibility.goToHomepage')">
      <span class="brand__mark">
        <img
          ngSrc="assets/images/del-02.png"
          alt="Logo da Del Tecnologia"
          width="1024"
          height="1024"
          priority
        >
      </span>
      <span class="brand__text">
        <small class="brand__eyebrow">{{ i18n.t('ui.labels.medicalTechnology') }}</small>
        <span class="brand__title-row">
          <strong>{{ companyName }}</strong>
        </span>
      </span>
    </a>

    <nav class="header__nav" [attr.aria-label]="i18n.t('ui.accessibility.mainNavigation')">
      @for (item of navItems; track item.route + ':' + (item.fragment ?? '')) {
        <a
          class="header__link"
          appPremiumFx="soft"
          [routerLink]="item.route"
          [fragment]="item.fragment"
          routerLinkActive="header__link--active"
          [routerLinkActiveOptions]="{ exact: item.exact ?? item.route === '/' }"
        >
          @if (item.icon) {
            <mat-icon>{{ item.icon }}</mat-icon>
          }
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="header__actions">
      <app-language-switcher></app-language-switcher>

      <a mat-flat-button class="header__cta" appPremiumFx="button" color="primary" [routerLink]="contactRoute" [fragment]="contactFragment">
        {{ i18n.t('ui.actions.talkToDel') }}
      </a>
    </div>

    <button
      mat-icon-button
      class="header__menu-button"
      appPremiumFx="icon"
      type="button"
      (click)="menuToggle.emit()"
      [attr.aria-label]="i18n.t('ui.accessibility.openMenu')"
    >
      <mat-icon>menu</mat-icon>
    </button>
  </mat-toolbar>
</header>
